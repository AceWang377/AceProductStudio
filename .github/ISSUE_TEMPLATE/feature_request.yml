name: Feature request
description: Suggest a focused improvement.
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What maintainer, contributor, or user problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the smallest useful version.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - AI generation
        - Shopify integration
        - Supabase/auth/data
        - Stripe/billing
        - Security/privacy
        - QA/testing
        - Documentation
        - UI/UX
        - Other
  - type: textarea
    id: tradeoffs
    attributes:
      label: Tradeoffs or risks
      description: Note security, privacy, provider-cost, or operational considerations.
